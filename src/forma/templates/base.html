<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}forma{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <!-- Apply theme before render to prevent flash -->
  <script>
    (function() {
      const stored = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (stored === 'dark' || (!stored && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link rel="stylesheet" href="/static/css/theme.css" />
  {% block extra_head %}{% endblock %}
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            wordmark: ['"Space Grotesk"', 'sans-serif'],
          },
          colors: {
            /* Brand — same in both modes */
            mint:      '#599DA4',
            sky:       '#60A5FA',
            amber:     '#EFB74C',
            coral:     '#E46B47',
            accent:    '#599DA4',
            secondary: '#EFB74C',
            tertiary:  '#E46B47',
            /* Semantic — CSS-variable-backed, auto-adapt to theme */
            'nav-bg':      'var(--color-nav)',
            'surface':     'var(--color-surface)',
            'surface-alt': 'var(--color-surface-alt)',
            'edge':        'var(--color-edge)',
            /* Text — semantic aliases */
            'primary':   'var(--color-text)',
            'secondary': 'var(--color-text-secondary)',
            'muted':     'var(--color-text-muted)',
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen flex">

  <!-- ── Sidebar ───────────────────────────────────────────── -->
  <aside id="sidebar"
         class="fixed inset-y-0 left-0 z-40 w-56 flex flex-col -translate-x-full md:translate-x-0 transition-transform duration-200"
         style="background:var(--color-nav)">

    <!-- Logo -->
    <div class="h-14 flex items-center px-5 shrink-0">
      <a href="/" class="flex items-center gap-2">
        <svg viewBox="0 0 14 20" width="14" height="20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="0" y="0" width="14" height="4.5" rx="2.25" fill="var(--color-nav-logo-body)"/>
          <rect x="0" y="0" width="4.5" height="20" rx="2.25" fill="var(--color-nav-logo-body)"/>
          <rect x="0" y="8.5" width="11" height="4" rx="2" fill="var(--color-nav-logo-mark)"/>
          <circle cx="2.25" cy="2.25" r="1.9" fill="var(--color-nav-logo-mark)"/>
          <circle cx="12" cy="17.5" r="2.2" fill="var(--color-nav-logo-mark)"/>
        </svg>
        <span class="font-wordmark text-xl font-bold tracking-tight" style="color:var(--color-nav-text-bold)">forma</span>
      </a>
    </div>

    <!-- Nav links -->
    <nav class="flex-1 px-3 py-2 flex flex-col gap-0.5 overflow-y-auto">

      <a href="/" data-nav-href="/" class="nav-link">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/>
        </svg>
        Overview
      </a>

      <a href="/activities/all/1" data-nav-href="/activities" class="nav-link">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0ZM3.75 12h.007v.008H3.75V12Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm-.375 5.25h.007v.008H3.75v-.008Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z"/>
        </svg>
        Activities
      </a>

      <a href="/analytics/run" data-nav-href="/analytics" class="nav-link">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z"/>
        </svg>
        Analytics
      </a>

      <a href="/progress" data-nav-href="/progress" class="nav-link">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18 9 11.25l4.306 4.306a11.95 11.95 0 0 1 5.814-5.518l2.74-1.22m0 0-5.94-2.281m5.94 2.28-2.28 5.941"/>
        </svg>
        Progress
      </a>

      <a href="/insights" data-nav-href="/insights" class="nav-link">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 18v-5.25m0 0a6.01 6.01 0 0 0 1.5-.189m-1.5.189a6.01 6.01 0 0 1-1.5-.189m3.75 7.478a12.06 12.06 0 0 1-4.5 0m3.75 2.383a14.406 14.406 0 0 1-3 0M14.25 18v-.192c0-.983.658-1.823 1.508-2.316a7.5 7.5 0 1 0-7.517 0c.85.493 1.509 1.333 1.509 2.316V18"/>
        </svg>
        Insights
      </a>

      <!-- Divider -->
      <div class="my-2 mx-1 h-px" style="background:var(--color-nav-divider)"></div>

      <a href="/plan" data-nav-href="/plan" class="nav-link">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5"/>
        </svg>
        Plan
      </a>

      <a href="/goal" data-nav-href="/goal" class="nav-link">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.563.563 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.563.563 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5z"/>
        </svg>
        Goal
      </a>

      <a href="/profile" data-nav-href="/profile" class="nav-link">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/>
        </svg>
        Profile
      </a>

    </nav>

    <!-- Bauhaus color strip -->
    <div class="shrink-0 flex h-1.5">
      <div class="flex-1 bg-[#1C1A15] dark:bg-[#599DA4]"></div>
      <div class="flex-1 bg-[#EFB74C]"></div>
      <div class="flex-1 bg-[#E46B47]"></div>
    </div>

    <!-- Sync progress strip (hidden by default) -->
    <div id="sync-strip" class="hidden shrink-0 px-4 py-3" style="border-top:1px solid var(--color-nav-divider)">
      <div class="flex items-center gap-2 mb-1.5">
        <svg id="sync-strip-icon" xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 shrink-0 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--color-nav-text)">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>
        </svg>
        <span id="sync-strip-label" class="text-xs font-medium truncate" style="color:var(--color-nav-text)">Syncing…</span>
        <span id="sync-strip-time" class="text-xs tabular-nums ml-auto shrink-0" style="color:var(--color-nav-text);opacity:0.6"></span>
      </div>
      <div class="text-xs truncate" id="sync-strip-detail" style="color:var(--color-nav-text);opacity:0.6"></div>
    </div>

    <!-- Sidebar footer: version + actions -->
    <div class="shrink-0 px-4 py-3" style="border-top:1px solid var(--color-nav-divider)">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          {% if request.state.dev_mode %}
          <span class="text-xs font-mono px-1.5 py-0.5 rounded bg-amber/20 text-amber">dev</span>
          {% endif %}
          <span class="text-xs font-mono opacity-40" style="color:var(--color-nav-text)" title="Commit {{ request.state.commit_hash }}">{{ request.state.commit_hash }}</span>
        </div>
        <div class="flex items-center gap-0.5">
          <button id="sync-btn" onclick="triggerSync()"
                  class="nav-btn w-7 h-7 flex items-center justify-center rounded-full cursor-pointer" style="color:var(--color-nav-text)"
                  title="Sync from Strava" aria-label="Sync from Strava">
            <svg id="sync-icon" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
              <path d="M21 3v5h-5"/>
              <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
              <path d="M8 16H3v5"/>
            </svg>
          </button>
          <button id="theme-toggle" onclick="toggleTheme()"
                  class="nav-btn w-7 h-7 flex items-center justify-center rounded-full cursor-pointer" style="color:var(--color-nav-text)"
                  title="Toggle theme" aria-label="Toggle theme">
            <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" class="hidden w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
            </svg>
            <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
          {% if request.state.is_superadmin %}
          <a href="/admin"
             class="nav-btn w-7 h-7 flex items-center justify-center rounded-full" style="color:var(--color-nav-text)"
             title="Admin panel" aria-label="Admin panel">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
            </svg>
          </a>
          {% endif %}
          <form method="post" action="/logout">
            <button type="submit"
                    class="nav-btn w-7 h-7 flex items-center justify-center rounded-full cursor-pointer" style="color:var(--color-nav-text)"
                    title="Sign out" aria-label="Sign out">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
            </button>
          </form>
        </div>
      </div>
    </div>

  </aside>

  <!-- ── Mobile header ─────────────────────────────────────── -->
  <header class="md:hidden fixed top-0 inset-x-0 z-30 h-14 flex items-center px-4 gap-3 shadow-sm" style="background:var(--color-nav)">
    <button onclick="toggleSidebar()"
            class="nav-btn w-8 h-8 flex items-center justify-center rounded-lg text-muted cursor-pointer"
            aria-label="Open navigation">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
      </svg>
    </button>
    <a href="/" class="flex items-center gap-2">
      <svg viewBox="0 0 14 20" width="12" height="17" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="0" y="0" width="14" height="4.5" rx="2.25" fill="var(--color-nav-logo-body)"/>
        <rect x="0" y="0" width="4.5" height="20" rx="2.25" fill="var(--color-nav-logo-body)"/>
        <rect x="0" y="8.5" width="11" height="4" rx="2" fill="var(--color-nav-logo-mark)"/>
        <circle cx="2.25" cy="2.25" r="1.9" fill="var(--color-nav-logo-mark)"/>
        <circle cx="12" cy="17.5" r="2.2" fill="var(--color-nav-logo-mark)"/>
      </svg>
      <span class="font-wordmark text-lg font-bold tracking-tight" style="color:var(--color-nav-text-bold)">forma</span>
    </a>
  </header>

  <!-- ── Sidebar overlay (mobile) ──────────────────────────── -->
  <div id="sidebar-overlay" class="fixed inset-0 z-30 bg-black/50 hidden md:hidden" onclick="toggleSidebar()"></div>

  <!-- ── Main content ──────────────────────────────────────── -->
  <main class="flex-1 md:pl-56 pt-14 md:pt-0 min-h-screen">
    <div class="max-w-5xl mx-auto px-4 md:px-6 py-6 md:py-8">
      {% block content %}{% endblock %}
    </div>
  </main>

  <script>
    // Active nav state + dynamic year
    (function() {
      const path = window.location.pathname;
      document.querySelectorAll('[data-nav-href]').forEach(link => {
        const href = link.dataset.navHref;
        const isActive = href === '/' ? path === '/' : path.startsWith(href);
        if (isActive) {
          link.classList.add('nav-link-active');
        }
      });
    })();

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      const isOpen = !sidebar.classList.contains('-translate-x-full');
      sidebar.classList.toggle('-translate-x-full', isOpen);
      overlay.classList.toggle('hidden', isOpen);
    }
  </script>

  <script>
    function triggerSync() {
      const btn = document.getElementById('sync-btn');
      const strip = document.getElementById('sync-strip');
      const stripIcon = document.getElementById('sync-strip-icon');
      const stripLabel = document.getElementById('sync-strip-label');
      const stripDetail = document.getElementById('sync-strip-detail');
      const stripTime = document.getElementById('sync-strip-time');

      btn.disabled = true;
      strip.classList.remove('hidden');
      stripLabel.textContent = 'Syncing…';
      stripDetail.textContent = '';
      stripIcon.classList.add('animate-spin');

      const startTime = Date.now();
      const timer = setInterval(() => {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const m = Math.floor(elapsed / 60);
        const s = elapsed % 60;
        stripTime.textContent = m > 0 ? `${m}:${String(s).padStart(2,'0')}` : `${s}s`;
      }, 1000);

      const es = new EventSource('/api/sync/stream');

      es.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.error) {
          stripLabel.textContent = 'Sync failed';
          stripDetail.textContent = '';
          es.close();
          finish(false);
          return;
        }
        if (data.done) {
          const n = data.synced;
          stripLabel.textContent = n === 0 ? 'Up to date' : `+${n} ${n === 1 ? 'activity' : 'activities'}`;
          stripDetail.textContent = '';
          es.close();
          finish(n > 0);
          return;
        }
        const total = data.synced + data.skipped;
        const phase = data.phase === 'backfill' ? 'Backfilling' : 'Syncing';
        stripLabel.textContent = `${phase} · ${total} ${total === 1 ? 'activity' : 'activities'}`;
        stripDetail.textContent = data.activity;
      };

      es.onerror = () => {
        stripLabel.textContent = 'Sync failed';
        stripDetail.textContent = '';
        es.close();
        finish(false);
      };

      function finish(hasNew) {
        clearInterval(timer);
        btn.disabled = false;
        stripIcon.classList.remove('animate-spin');
        setTimeout(() => {
          strip.classList.add('hidden');
          if (hasNew) window.location.reload();
        }, hasNew ? 1500 : 3000);
      }
    }
  </script>

  <script>
    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      updateThemeIcon(isDark);
    }

    function updateThemeIcon(isDark) {
      document.getElementById('icon-sun').classList.toggle('hidden', !isDark);
      document.getElementById('icon-moon').classList.toggle('hidden', isDark);
    }

    updateThemeIcon(document.documentElement.classList.contains('dark'));

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      if (!localStorage.getItem('theme')) {
        document.documentElement.classList.toggle('dark', e.matches);
        updateThemeIcon(e.matches);
      }
    });
  </script>

</body>
</html>
