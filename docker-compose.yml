services:
  postgres:
    image: postgres:16-alpine
    container_name: forma_postgres
    environment:
      POSTGRES_DB: forma
      POSTGRES_USER: forma
      POSTGRES_PASSWORD: forma
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forma"]
      interval: 5s
      timeout: 5s
      retries: 5

  forma:
    build: .
    container_name: forma
    ports:
      - "8080:8080"
    volumes:
      - ./.env:/app/.env:ro
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://forma:forma@postgres:5432/forma
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    tty: true
    develop:
      watch:
        - action: sync+restart
          path: ./src
          target: /app/src
        - action: sync+restart
          path: ./pyproject.toml
          target: /app/pyproject.toml

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: forma_tunnel
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - forma
    restart: unless-stopped

  backup:
    image: postgres:16-alpine
    container_name: forma_backup
    environment:
      PGHOST: postgres
      PGUSER: forma
      PGPASSWORD: forma
      PGDATABASE: forma
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "0 3 * * * pg_dump -Fc > /backups/forma_$$(date +%Y%m%d_%H%M%S).dump && find /backups -name '*.dump' -mtime +7 -delete" | crontab -
        crond -f
    restart: unless-stopped

volumes:
  postgres_data:
