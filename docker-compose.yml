services:
  postgres:
    image: postgres:16-alpine
    container_name: forma_postgres
    environment:
      POSTGRES_DB: forma
      POSTGRES_USER: forma
      POSTGRES_PASSWORD: forma
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forma"]
      interval: 5s
      timeout: 5s
      retries: 5

  forma:
    build: .
    container_name: forma
    ports:
      - "8080:8080"
    volumes:
      - ./.env:/app/.env:ro
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://forma:forma@postgres:5432/forma
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    tty: true

volumes:
  postgres_data:
